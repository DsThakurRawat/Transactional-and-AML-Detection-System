services:
  - type: web
    name: transaction-intelligence-api
    env: python
    plan: free
    # Uv makes dependency installation fast. Using the bash script below:
    buildCommand: "pip install uv && uv sync"
    startCommand: "uv run uvicorn interface.api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: ALLOWED_ORIGINS
        sync: false
